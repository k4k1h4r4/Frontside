<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Keno &mdash; Frontside</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">FRONTSIDE</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="atmosphere.html">Atmosphere</a></li>
      <li><a href="keno.html" class="active">Keno</a></li>
    </ul>
  </nav>

  <div class="keno-page">

    <!-- Page heading -->
    <div class="keno-page-header">
      <div class="keno-logo-block">
        <p class="section-label">Live Results</p>
        <img src="images/LuckyKeno.png" alt="Lucky Keno" class="keno-logo">
      </div>
    </div>

    <!-- Game header -->
    <div class="keno-header">
      <div class="keno-game-info">
        <div class="keno-game-number" id="game-number">——</div>
        <div class="keno-timestamp" id="game-timestamp">Loading&hellip;</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:0.75rem;">
        <div class="keno-status">
          <div class="keno-status-dot" id="status-dot"></div>
          <span id="status-text">Connecting</span>
        </div>
        <button class="btn btn-secondary" id="refresh-btn" onclick="loadLatest()" style="font-size:0.75rem; padding: 0.4rem 1rem;">
          ↺ &nbsp;Refresh
        </button>
      </div>
    </div>

    <!-- Error display -->
    <div id="error-msg" class="error-msg" style="display:none; margin-bottom:1.5rem;"></div>

    <!-- Keno board -->
    <div class="keno-board-wrap" id="board-wrap" style="display:none;">
      <div style="margin-bottom:1.2rem;">
        <p style="font-family:'Oswald',sans-serif; font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-muted); margin-bottom:4px;">Numbers 1 – 40</p>
        <div class="keno-section" id="section-low"></div>
      </div>
      <div>
        <p style="font-family:'Oswald',sans-serif; font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-muted); margin-bottom:4px;">Numbers 41 – 80</p>
        <div class="keno-section" id="section-high"></div>
      </div>
    </div>

    <!-- Draw order strip -->
    <div id="draw-order-wrap" style="display:none; margin-bottom: 2.5rem;">
      <p class="draw-order-label">Draw Order</p>
      <div class="draw-order-strip" id="draw-order"></div>
    </div>

    <!-- Recent games -->
    <div class="recent-toggle-row">
      <div>
        <p class="section-label" style="margin-bottom:0.2rem;">History</p>
        <h3 style="font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.08em; color:var(--text);">Recent Games</h3>
      </div>
      <button class="btn btn-secondary" id="recent-btn" onclick="toggleRecent()">Show Last 10</button>
    </div>

    <div id="recent-panel" class="recent-panel">
      <div class="loading-msg" id="recent-loading">Loading recent games&hellip;</div>
    </div>

  </div>

  <footer>
    <p>FRONTSIDE &nbsp;&mdash;&nbsp; Keno results via <a href="https://kenocloud.com" target="_blank">KenoCloud</a></p>
  </footer>

  <script>
    const BASE = 'https://kenocloud.com/kenocloud/casino/41/game/1/balldraw';

    let latestRaceId     = null;
    let latestRaceNumber = null;
    let currentRaceId    = null;
    let recentLoaded     = false;
    let recentOpen       = false;
    let pollTimer        = null;

    // ── FETCH HELPERS ─────────────────────────────────────
    async function fetchDraw(idOrLatest) {
      const url = `${BASE}/${idOrLatest}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    // ── FORMAT TIMESTAMP ──────────────────────────────────
    function formatTimestamp(ts) {
      const d = new Date(ts);
      return d.toLocaleString('en-US', {
        weekday: 'short',
        month:   'short',
        day:     'numeric',
        year:    'numeric',
        hour:    'numeric',
        minute:  '2-digit',
        hour12:  true
      });
    }

    // ── RENDER BOARD ──────────────────────────────────────
    function renderBoard(balls) {
      const drawnSet = new Set(balls);

      function buildSection(containerId, start, end) {
        const el = document.getElementById(containerId);
        el.innerHTML = '';
        for (let n = start; n <= end; n++) {
          const cell = document.createElement('div');
          cell.className = 'keno-cell' + (drawnSet.has(n) ? ' drawn' : '');
          cell.textContent = n;
          el.appendChild(cell);
        }
      }

      buildSection('section-low',  1,  40);
      buildSection('section-high', 41, 80);
      document.getElementById('board-wrap').style.display = 'block';
    }

    // ── RENDER DRAW ORDER STRIP ───────────────────────────
    function renderDrawOrder(balls) {
      const strip = document.getElementById('draw-order');
      strip.innerHTML = '';
      balls.forEach((num, i) => {
        const ball = document.createElement('div');
        ball.className = 'draw-ball';
        ball.innerHTML = `${num}<span class="draw-ball-num">#${i + 1}</span>`;
        strip.appendChild(ball);
      });
      document.getElementById('draw-order-wrap').style.display = 'block';
    }

    // ── DISPLAY A GAME ────────────────────────────────────
    function displayGame(data) {
      currentRaceId = data.raceid;
      document.getElementById('game-number').textContent    = `Game #${data.racenumber}`;
      document.getElementById('game-timestamp').textContent = formatTimestamp(data.timestamp);
      renderBoard(data.balls);
      renderDrawOrder(data.balls);
      setStatus('live', data.raceid === latestRaceId ? 'Live' : `Race ${data.raceid}`);

      // Highlight selected row in recent panel if open
      document.querySelectorAll('.recent-item').forEach(el => {
        el.classList.toggle('selected', el.dataset.raceid == data.raceid);
      });
    }

    // ── STATUS DOT ────────────────────────────────────────
    function setStatus(state, label) {
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      dot.className  = 'keno-status-dot' + (state === 'live' ? ' live' : '');
      text.textContent = label;
    }

    // ── SHOW / HIDE ERROR ─────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.style.display = 'block';
      el.textContent = msg;
      setStatus('', 'Error');
    }

    function clearError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    // ── LOAD LATEST ───────────────────────────────────────
    async function loadLatest() {
      clearError();
      setStatus('', 'Loading…');
      try {
        const data = await fetchDraw('latest');
        latestRaceId     = data.raceid;
        latestRaceNumber = data.racenumber;
        displayGame(data);

        // If recent panel is open, refresh it too
        if (recentOpen) {
          recentLoaded = false;
          await loadRecent(false);
        }
      } catch (err) {
        showError(`Unable to load results. ${err.message}. Check that this page is served with cross-origin access to kenocloud.com.`);
      }
    }

    // ── AUTO-POLL (every 90s) ─────────────────────────────
    function startPolling() {
      clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        if (document.hidden) return; // don't poll when tab is hidden
        try {
          const data = await fetchDraw('latest');
          if (data.raceid !== latestRaceId) {
            // New game drawn — update everything
            latestRaceId     = data.raceid;
            latestRaceNumber = data.racenumber;
            displayGame(data);
            if (recentOpen) {
              recentLoaded = false;
              await loadRecent(false);
            }
          }
        } catch (_) { /* silent on poll fail */ }
      }, 90000);
    }

    // ── RECENT GAMES PANEL ────────────────────────────────
    async function toggleRecent() {
      const panel = document.getElementById('recent-panel');
      const btn   = document.getElementById('recent-btn');

      if (recentOpen) {
        recentOpen = false;
        panel.classList.remove('open');
        btn.textContent = 'Show Last 10';
        return;
      }

      recentOpen = true;
      panel.classList.add('open');
      btn.textContent = 'Hide Recent';

      if (!recentLoaded) {
        await loadRecent(true);
      }
    }

    async function loadRecent(showLoading) {
      if (!latestRaceId) return;

      const panel = document.getElementById('recent-panel');

      if (showLoading) {
        panel.innerHTML = '<div class="loading-msg">Loading recent games&hellip;</div>';
      }

      try {
        // Fetch 10 games: latest + 9 previous
        const ids = Array.from({ length: 10 }, (_, i) => latestRaceId - i);
        const results = await Promise.all(ids.map(id => fetchDraw(id)));

        panel.innerHTML = '';

        results.forEach(game => {
          const item = document.createElement('div');
          item.className = 'recent-item' + (game.raceid === currentRaceId ? ' selected' : '');
          item.dataset.raceid = game.raceid;

          const time = new Date(game.timestamp).toLocaleString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric',
            hour: 'numeric', minute: '2-digit', hour12: true
          });

          const ballStr = [...game.balls].sort((a, b) => a - b).join(' · ');

          item.innerHTML = `
            <div>
              <div class="recent-game-num">Game #${game.racenumber}</div>
              <div class="recent-game-balls">${ballStr}</div>
            </div>
            <div style="text-align:right;">
              <div class="recent-game-time">${time}</div>
              ${game.raceid === latestRaceId ? '<div style="font-family:Oswald,sans-serif; font-size:0.65rem; letter-spacing:0.2em; color:#3a8a3a; margin-top:3px;">LATEST</div>' : ''}
            </div>
          `;

          item.addEventListener('click', () => displayGame(game));
          panel.appendChild(item);
        });

        recentLoaded = true;

      } catch (err) {
        panel.innerHTML = `<div class="error-msg" style="margin:1rem;">Could not load recent games. ${err.message}</div>`;
      }
    }

    // ── INIT ──────────────────────────────────────────────
    (async function init() {
      await loadLatest();
      startPolling();
    })();
  </script>

</body>
</html>
