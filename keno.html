<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Keno &mdash; Frontside</title>
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">FRONTSIDE</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="atmosphere.html">Atmosphere</a></li>
      <li><a href="keno.html" class="active">Keno</a></li>
    </ul>
  </nav>

  <div class="keno-page">

    <div class="keno-header">
      <div class="keno-game-info">
        <div class="keno-game-number" id="game-number">——</div>
        <div class="keno-timestamp" id="game-timestamp">Loading&hellip;</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:0.75rem;">
        <div class="keno-status">
          <div class="keno-status-dot" id="status-dot"></div>
          <span id="status-text">Connecting</span>
        </div>
        <div class="keno-action-stack">
          <button class="btn btn-secondary" id="heatmap-btn" onclick="toggleHeatMap()" style="font-size:0.75rem; padding: 0.2rem 0.6rem;min-width:100px;">
            Heat Map
          </button>
          <button class="btn btn-secondary" id="refresh-btn" onclick="loadLatest()" style="font-size:1rem; padding: 0.2rem 0.6rem;min-width:20px;">
            ↺
          </button>
        </div>
      </div>
    </div>

    <div id="error-msg" class="error-msg" style="display:none; margin-bottom:1.5rem;"></div>

    <div class="keno-board-wrap" id="board-wrap" style="display:none;">
      <div style="margin-bottom:1.2rem;">
        <p style="font-family:'Oswald',sans-serif; font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-muted); margin-bottom:4px;">Numbers 1 – 40</p>
        <div class="keno-section" id="section-low"></div>
      </div>
      <div>
        <p style="font-family:'Oswald',sans-serif; font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-muted); margin-bottom:4px;">Numbers 41 – 80</p>
        <div class="keno-section" id="section-high"></div>
      </div>
    </div>

    <div id="heatmap-legend" class="heatmap-legend" style="display:none;">
      <div class="heatmap-legend-title">Last 20 Games Heat Map</div>
      <div class="heatmap-legend-bar">
        <span class="heatmap-chip heatmap-chip-zero">0 draws</span>
        <span class="heatmap-chip heatmap-chip-cold">Cold</span>
        <span class="heatmap-chip heatmap-chip-mid">Warm</span>
        <span class="heatmap-chip heatmap-chip-hot">Hot</span>
      </div>
    </div>

    <div id="draw-order-wrap" style="display:none; margin-bottom: 2.5rem;">
      <p class="draw-order-label">Draw Order</p>
      <div class="draw-order-strip" id="draw-order"></div>
    </div>

    <div class="recent-toggle-row">
      <div>
        <p class="section-label" style="margin-bottom:0.2rem;">History</p>
        <h3 style="font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.08em; color:var(--text);">Recent Games</h3>
      </div>
      <button class="btn btn-secondary" id="recent-btn" onclick="toggleRecent()">Show Last 20</button>
    </div>

    <div id="recent-panel" class="recent-panel">
      <div class="loading-msg" id="recent-loading">Loading recent games&hellip;</div>
    </div>

  </div>

  <footer>
    <p>FRONTSIDE &nbsp;&mdash;&nbsp; Keno results via <a href="https://kenocloud.com" target="_blank">KenoCloud</a></p>
  </footer>

  <script>
    const BASE = 'https://kenocloud.com/kenocloud/casino/41/game/1/balldraw';

    let latestRaceId = null;
    let latestRaceNumber = null;
    let currentRaceId = null;
    let recentLoaded = false;
    let recentOpen = false;
    let pollTimer = null;
    let drawAnimationTimer = null;
    let drawAnimationToken = 0;
    let recentGamesCache = [];
    let heatMapCounts = {};
    let heatMapEnabled = false;

    async function fetchDraw(idOrLatest) {
      const url = `${BASE}/${idOrLatest}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function formatTimestamp(ts) {
      const d = new Date(ts);
      return d.toLocaleString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
    }

    function renderBoard() {
      function buildSection(containerId, start, end) {
        const el = document.getElementById(containerId);
        el.innerHTML = '';
        for (let n = start; n <= end; n++) {
          const cell = document.createElement('div');
          cell.className = 'keno-cell';
          cell.textContent = n;
          cell.dataset.num = n;
          el.appendChild(cell);
        }
      }

      buildSection('section-low', 1, 40);
      buildSection('section-high', 41, 80);
      document.getElementById('board-wrap').style.display = 'block';
    }

    function renderDrawOrder(balls) {
      const strip = document.getElementById('draw-order');
      strip.innerHTML = '';
      balls.forEach((num, i) => {
        const ball = document.createElement('div');
        ball.className = 'draw-ball';
        ball.dataset.num = num;
        ball.innerHTML = `${num}<span class="draw-ball-num">#${i + 1}</span>`;
        strip.appendChild(ball);
      });
      document.getElementById('draw-order-wrap').style.display = 'block';
    }

    function buildHeatMapCounts(games) {
      const counts = Object.fromEntries(Array.from({ length: 80 }, (_, i) => [i + 1, 0]));
      games.forEach(game => {
        (game.balls || []).forEach(num => {
          if (counts[num] !== undefined) counts[num] += 1;
        });
      });
      return counts;
    }

    function getHeatMapStyle(count) {
      if (count === 0) {
        return {
          background: 'linear-gradient(180deg, #171717 0%, #000000 100%)',
          borderColor: '#5a5a5a',
          color: '#ffffff',
          boxShadow: '0 0 14px rgba(255,255,255,0.10)'
        };
      }

      const maxCount = Math.max(...Object.values(heatMapCounts), 1);
      const ratio = count / maxCount;

      if (ratio <= 0.34) {
        return {
          background: 'linear-gradient(180deg, #1f86ff 0%, #0048b8 100%)',
          borderColor: '#6cb8ff',
          color: '#ffffff',
          boxShadow: '0 0 14px rgba(31,134,255,0.42)'
        };
      }

      if (ratio <= 0.67) {
        return {
          background: 'linear-gradient(180deg, #32d74b 0%, #118c2f 100%)',
          borderColor: '#78ff8f',
          color: '#ffffff',
          boxShadow: '0 0 14px rgba(50,215,75,0.42)'
        };
      }

      return {
        background: 'linear-gradient(180deg, #ff4b4b 0%, #b10000 100%)',
        borderColor: '#ff9b9b',
        color: '#ffffff',
        boxShadow: '0 0 14px rgba(255,75,75,0.44)'
      };
    }

    function applyHeatMap() {
      document.querySelectorAll('.keno-cell').forEach(cell => {
        const num = Number(cell.dataset.num);
        const count = heatMapCounts[num] ?? 0;

        cell.classList.toggle('heatmap-active', heatMapEnabled);
        cell.classList.toggle('heatmap-zero', heatMapEnabled && count === 0);

        if (!heatMapEnabled) {
          cell.style.background = '';
          cell.style.borderColor = '';
          cell.style.color = '';
          cell.style.boxShadow = '';
          cell.removeAttribute('title');
          return;
        }

        const style = getHeatMapStyle(count);
        cell.style.background = style.background;
        cell.style.borderColor = style.borderColor;
        cell.style.color = style.color;
        cell.style.boxShadow = style.boxShadow;
        cell.title = count === 0
          ? `Ball ${num}: not drawn in the last 20 games`
          : `Ball ${num}: drawn ${count} time${count === 1 ? '' : 's'} in the last 20 games`;
      });
    }

    function updateHeatMapButton() {
      const btn = document.getElementById('heatmap-btn');
      btn.classList.toggle('active', heatMapEnabled);
      btn.textContent = heatMapEnabled ? 'Hide Heat Map' : 'Heat Map';
    }

    function updateHeatMapLegend() {
      document.getElementById('heatmap-legend').style.display = heatMapEnabled ? 'block' : 'none';
    }

    function animateDraw(balls) {
      drawAnimationToken += 1;
      const token = drawAnimationToken;
      clearTimeout(drawAnimationTimer);

      document.querySelectorAll('.keno-cell.drawn, .keno-cell.just-drawn').forEach(el => {
        el.classList.remove('drawn', 'just-drawn');
      });
      document.querySelectorAll('.draw-ball.active').forEach(el => {
        el.classList.remove('active');
      });

      balls.forEach((num, index) => {
        drawAnimationTimer = setTimeout(() => {
          if (token !== drawAnimationToken) return;

          const cell = document.querySelector(`.keno-cell[data-num="${num}"]`);
          const ball = document.querySelector(`.draw-ball[data-num="${num}"]`);

          if (cell) {
            cell.classList.add('drawn', 'just-drawn');
            setTimeout(() => {
              if (token === drawAnimationToken) {
                cell.classList.remove('just-drawn');
              }
            }, 260);
          }

          if (ball) {
            ball.classList.add('active');
          }
        }, index * 85);
      });
    }

    function displayGame(data) {
      currentRaceId = data.raceid;
      document.getElementById('game-number').textContent = `Game #${data.racenumber}`;
      document.getElementById('game-timestamp').textContent = formatTimestamp(data.timestamp);
      renderBoard();
      renderDrawOrder(data.balls);
      applyHeatMap();
      animateDraw(data.balls);
      setStatus('live', data.raceid === latestRaceId ? 'Live' : `Race ${data.raceid}`);

      document.querySelectorAll('.recent-item').forEach(el => {
        el.classList.toggle('selected', el.dataset.raceid == data.raceid);
      });
    }

    function setStatus(state, label) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      dot.className = 'keno-status-dot' + (state === 'live' ? ' live' : '');
      text.textContent = label;
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.style.display = 'block';
      el.textContent = msg;
      setStatus('', 'Error');
    }

    function clearError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    async function loadLatest() {
      clearError();
      setStatus('', 'Loading…');
      try {
        const data = await fetchDraw('latest');
        latestRaceId = data.raceid;
        latestRaceNumber = data.racenumber;

        recentLoaded = false;
        await loadRecent(false);
        displayGame(data);
      } catch (err) {
        showError(`Unable to load results. ${err.message}. Check that this page is served with cross-origin access to kenocloud.com.`);
      }
    }

    function startPolling() {
      clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        if (document.hidden) return;
        try {
          const data = await fetchDraw('latest');
          if (data.raceid !== latestRaceId) {
            latestRaceId = data.raceid;
            latestRaceNumber = data.racenumber;
            recentLoaded = false;
            await loadRecent(false);
            displayGame(data);
          }
        } catch (_) {}
      }, 90000);
    }

    async function toggleRecent() {
      const panel = document.getElementById('recent-panel');
      const btn = document.getElementById('recent-btn');

      if (recentOpen) {
        recentOpen = false;
        panel.classList.remove('open');
        btn.textContent = 'Show Last 20';
        return;
      }

      recentOpen = true;
      panel.classList.add('open');
      btn.textContent = 'Hide Recent';

      if (!recentLoaded) {
        await loadRecent(true);
      }
    }

    async function loadRecent(showLoading) {
      if (!latestRaceId) return;

      const panel = document.getElementById('recent-panel');

      if (showLoading) {
        panel.innerHTML = '<div class="loading-msg">Loading recent games&hellip;</div>';
      }

      try {
        const ids = Array.from({ length: 20 }, (_, i) => latestRaceId - i);
        const results = await Promise.all(ids.map(id => fetchDraw(id)));
        recentGamesCache = results;
        heatMapCounts = buildHeatMapCounts(results);

        panel.innerHTML = '';

        results.forEach(game => {
          const item = document.createElement('div');
          item.className = 'recent-item' + (game.raceid === currentRaceId ? ' selected' : '');
          item.dataset.raceid = game.raceid;

          const time = new Date(game.timestamp).toLocaleString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric',
            hour: 'numeric', minute: '2-digit', hour12: true
          });

          item.innerHTML = `
            <div class="recent-game-meta">
              <div class="recent-game-num">Game #${game.racenumber}</div>
              <div class="recent-game-time">${time}</div>
            </div>
            ${game.raceid === latestRaceId ? '<div class="recent-game-latest">LATEST</div>' : ''}
          `;

          item.addEventListener('click', () => {
            displayGame(game);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
          panel.appendChild(item);
        });

        applyHeatMap();
        recentLoaded = true;
      } catch (err) {
        panel.innerHTML = `<div class="error-msg" style="margin:1rem;">Could not load recent games. ${err.message}</div>`;
      }
    }

    function toggleHeatMap() {
      heatMapEnabled = !heatMapEnabled;
      updateHeatMapButton();
      updateHeatMapLegend();
      applyHeatMap();

      if (!heatMapEnabled) {
        const currentGame = recentGamesCache.find(game => game.raceid === currentRaceId);
        if (currentGame) animateDraw(currentGame.balls);
      }
    }

    (async function init() {
      updateHeatMapButton();
      updateHeatMapLegend();
      await loadLatest();
      startPolling();
    })();
  </script>

</body>
</html>
